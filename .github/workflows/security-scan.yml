name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:

  # -----------------------------------------------
  # 1. CodeQL
  # -----------------------------------------------
  codeql:
    name: CodeQL Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: auto

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
        with:
          output: codeql-results

      - name: Upload CodeQL results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results
          path: codeql-results
        if: always()

  # -----------------------------------------------
  # 2. Semgrep
  # -----------------------------------------------
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif > semgrep.sarif

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always()

      - name: Upload Semgrep results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep.sarif
        if: always()

  # -----------------------------------------------
  # 3. OSV Scanner
  # -----------------------------------------------
  osv-scanner:
    name: OSV Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OSV Scanner
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: Run OSV Scanner
        run: ./osv-scanner scan source --recursive --format=sarif --output=osv-results.sarif ./
        continue-on-error: true

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif
        if: always()

      - name: Upload OSV results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: osv-results
          path: osv-results.sarif
        if: always()

  # -----------------------------------------------
  # 4. Snyk
  # -----------------------------------------------
  snyk:
    name: Snyk Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: snyk/actions/setup@master

      - name: Run Snyk against all projects
        run: snyk test --all-projects --sarif-file-output=snyk.sarif
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk.sarif
        if: always()

      - name: Upload Snyk results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: snyk.sarif
        if: always()
