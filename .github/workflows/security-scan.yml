name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:

  # -----------------------------------------------
  # 1. CodeQL - uses matrix to handle any language
  # -----------------------------------------------
  codeql:
    name: CodeQL Scan (${{ matrix.language }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [javascript, python]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v4

      - uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}
          output: codeql-results-${{ matrix.language }}

      - name: Upload CodeQL results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results-${{ matrix.language }}
          path: codeql-results-${{ matrix.language }}
        if: always()

  # -----------------------------------------------
  # 2. Semgrep
  # -----------------------------------------------
  semgrep:
    name: Semgrep Scan
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config auto --sarif > semgrep.sarif

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
        if: always()

      - name: Upload Semgrep results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: semgrep-results
          path: semgrep.sarif
        if: always()

  # -----------------------------------------------
  # 3. OSV Scanner
  # -----------------------------------------------
  osv-scanner:
    name: OSV Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OSV Scanner
        run: |
          curl -L https://github.com/google/osv-scanner/releases/latest/download/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: Run OSV Scanner
        run: ./osv-scanner scan source --recursive --format=sarif --output=osv-results.sarif ./ || true

      - name: Ensure valid OSV sarif exists
        run: |
          if [ ! -s osv-results.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > osv-results.sarif
          fi
        if: always()

      - name: Upload to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif
        if: always()

      - name: Upload OSV results as artifact
        uses: actions/upload-artifact@v4
        with:
          name: osv-results
          path: osv-results.sarif
        if: always()

  # -----------------------------------------------
  # 4. Snyk - dependencies AND source code
  # -----------------------------------------------
  snyk:
    name: Snyk Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: snyk/actions/setup@master

      - name: Snyk - scan dependencies
        run: snyk test --all-projects --sarif-file-output=snyk-deps.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk - scan source code
        run: snyk code test --sarif-file-output=snyk-code.sarif || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Ensure valid sarif files exist
        run: |
          if [ ! -s snyk-deps.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > snyk-deps.sarif
          fi
          if [ ! -s snyk-code.sarif ]; then
            echo '{"version":"2.1.0","runs":[]}' > snyk-code.sarif
          fi
        if: always()

      - name: Upload Snyk deps results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-deps.sarif
          category: snyk-deps
        if: always()

      - name: Upload Snyk code results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code
        if: always()

      - name: Upload Snyk results as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: snyk-results
          path: |
            snyk-deps.sarif
            snyk-code.sarif
        if: always()
